services:
  obsidian-mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ${VAULT_PATH}:/vault:ro
      - ./shared:/app/shared
      - ./indexer:/app/indexer
      - ./obsidian-mcp:/app/obsidian-mcp
      - obsidian_data:/data
      - model_cache:/app/models
    environment:
      - VAULT_PATH=/vault
      - DATA_PATH=/data
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      - COLLECTION_NAME=${COLLECTION_NAME:-obsidian_vault}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - OBSERVER_INTERVAL=${OBSERVER_INTERVAL:-1.0}
    # stdin_open is required for MCP stdio transport
    stdin_open: true

volumes:
  # Qdrant index — persists across container restarts
  obsidian_data:
  # fastembed model cache — avoids re-downloading on each build
  model_cache:
