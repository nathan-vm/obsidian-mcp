name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    # Skip the bump commit that cz pushes back to main
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: pip-audit
        run: uv run pip-audit

      - name: pytest + coverage
        run: uv run pytest -v

  release:
    name: Bump & Publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT needs repo scope to push commits to a protected branch.
          # Alternative: allow github-actions[bot] to bypass branch protection in Settings → Branches.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")

          if [ -z "$(git tag -l 'v*')" ]; then
            # First run: no tags yet — publish the current version as the initial release
            git tag -a "v${VERSION}" -m "Release v${VERSION}" HEAD
            git push origin "v${VERSION}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif uv run cz bump --yes; then
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            EXIT=$?
            # 21 = NoneIncrement, 3 = NO_COMMITS_FOUND — both mean nothing to release
            if [ $EXIT -eq 21 ] || [ $EXIT -eq 3 ]; then
              echo "bumped=false" >> "$GITHUB_OUTPUT"
            else
              exit $EXIT
            fi
          fi

      - name: Push bump commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push origin main --follow-tags

      - name: Set up QEMU
        if: steps.bump.outputs.bumped == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.bump.outputs.bumped == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.bump.outputs.bumped == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.bump.outputs.bumped == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/obsidian-mcp:${{ steps.bump.outputs.version }}
            ${{ vars.DOCKERHUB_USERNAME }}/obsidian-mcp:latest
          secrets: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update DockerHub description
        if: steps.bump.outputs.bumped == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_USERNAME }}/obsidian-mcp
          readme-filepath: ./README.md
